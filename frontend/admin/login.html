<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login | MediCare</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="admin-login-page">

    <!-- Left Side -->

    <div class="admin-left">

        <div class="overlay"></div>

        <div class="left-content">

            <i class="fa-solid fa-user-shield"></i>

            <h1>Admin Portal</h1>

            <h2>MediCare Management</h2>

            <p>

                Secure administrator access to manage doctors,
                patients, appointments, reports, and the entire
                healthcare system.

            </p>

        </div>

    </div>

    <!-- Right Side -->

    <div class="admin-right">

        <div class="admin-card">

            <h2>Administrator Login</h2>

            <p>

                Sign in to continue.

            </p>

            <form id="adminLoginForm">

                <div class="input-box">

                    <i class="fa-solid fa-user-shield"></i>

                    <input
    type="text"
    id="adminId"
    placeholder="Admin ID / Email"
    required>
                </div>

                <div class="input-box password-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
    type="password"
    id="adminPassword"
    placeholder="Password"
    required>

                    <span id="toggleAdminPassword">

                        <i class="fa-solid fa-eye"></i>

                    </span>

                </div>

                <div class="login-options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

                <button
                    type="submit"
                    class="admin-login-btn">

                    Login

                </button>

            <form action="dashboard.html">

            <a
                href="../role-selection.html"
                class="back-home">

                ← Back to Role Selection

            </a>

        </div>

    </div>

</div>

<script src="../js/admin-login.js"></script>

</body>

</html>
