<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Doctor Availability | MediCare</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="availability-container">

    <div class="availability-card">

        <div class="page-title">

            <i class="fa-solid fa-calendar-check"></i>

            <h1>Doctor Availability</h1>

            <p>Set your consultation schedule and availability.</p>

        </div>

        <form id="availabilityForm">

            <div class="form-grid">

                <div class="input-box">

                    <label>Doctor Name</label>

                    <input
                        type="text"
                        placeholder="Dr. John Doe"
                        required>

                </div>

                <div class="input-box">

                    <label>Department</label>

                    <input
                        type="text"
                        placeholder="Cardiology"
                        required>

                </div>

                <div class="input-box">

                    <label>Consultation Fee (₹)</label>

                    <input
                        type="number"
                        placeholder="500"
                        required>

                </div>

                <div class="input-box">

                    <label>Room Number</label>

                    <input
                        type="text"
                        placeholder="Room 204"
                        required>

                </div>

            </div>

            <h3>Available Days</h3>

            <div class="days-grid">

                <label><input type="checkbox"> Monday</label>

                <label><input type="checkbox"> Tuesday</label>

                <label><input type="checkbox"> Wednesday</label>

                <label><input type="checkbox"> Thursday</label>

                <label><input type="checkbox"> Friday</label>

                <label><input type="checkbox"> Saturday</label>

                <label><input type="checkbox"> Sunday</label>

            </div>

            <div class="form-grid">

                <div class="input-box">

                    <label>Start Time</label>

                    <input
                        type="time"
                        required>

                </div>

                <div class="input-box">

                    <label>End Time</label>

                    <input
                        type="time"
                        required>

                </div>

                <div class="input-box">

                    <label>Break Start</label>

                    <input
                        type="time">

                </div>

                <div class="input-box">

                    <label>Break End</label>

                    <input type="time" id="startTime">
                    <input type="time" id="endTime">
                    <input type="time" id="breakStart">
                    <input type="time" id="breakEnd">

                </div>

            </div>

            <h3>Consultation Mode</h3>

            <div class="radio-group">

                <label>

                    <input
                        type="radio"
                        name="mode"
                        checked>

                    Online

                </label>

                <label>

                    <input
                        type="radio"
                        name="mode">

                    Offline

                </label>

                <label>

                    <input
                        type="radio"
                        name="mode">

                    Both

                </label>

            </div>

            <div class="form-grid">

                <div class="input-box">

                    <label>Maximum Patients / Day</label>

                    <input
                        type="number"
                        placeholder="25"
                        required>

                </div>

                <div class="input-box">

                    <label>Status</label>

                    <select>

                        <option>Available</option>

                        <option>Busy</option>

                        <option>On Leave</option>

                        <option>Emergency Only</option>

                    </select>

                </div>

            </div>

            <div class="input-box">

                <label>Notes</label>

                <textarea
                    rows="5"
                    placeholder="Enter additional information..."></textarea>

            </div>

            <div class="button-group">

                <button
                    type="submit"
                    class="save-btn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Availability

                </button>

                <button
                    type="reset"
                    class="reset-btn">

                    <i class="fa-solid fa-rotate-left"></i>

                    Reset

                </button>

            </div>

        </form>

    </div>

</div>
<div class="top-actions">

    <button id="themeToggle" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>

</div>
<script src="../js/doctor.js"></script>

</body>

</html>
