<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Doctor Prescriptions | MediCare</title>

<link rel="stylesheet"
href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="prescription-container">

<div class="prescription-card">

<div class="page-actions">

<button id="themeToggle"
class="theme-btn">

<i class="fa-solid fa-moon"></i>

</button>

</div>

<div class="page-title">

<i class="fa-solid fa-file-prescription"></i>

<h1>Prescription Module</h1>

<p>Create and manage patient prescriptions.</p>

</div>

<form id="prescriptionForm">

<div class="form-grid">

<div class="input-box">

<label>Patient Name</label>

<input
type="text"
id="patientName"
placeholder="Enter Patient Name"
required>

</div>

<div class="input-box">

<label>Age</label>

<input
type="number"
id="patientAge"
required>

</div>

<div class="input-box">

<label>Gender</label>

<select id="patientGender">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-box">

<label>Date</label>

<input
type="date"
id="prescriptionDate"
required>

</div>

</div>

<div class="input-box">

<label>Diagnosis</label>

<textarea
id="diagnosis"
rows="4"
placeholder="Diagnosis..."
required></textarea>

</div>

<div class="input-box">

<label>Medicines</label>

<textarea
id="medicines"
rows="5"
placeholder="Example:

Paracetamol - 1 Tablet - Morning

Vitamin C - 1 Tablet - Night"></textarea>

</div>

<div class="form-grid">

<div class="input-box">

<label>Duration</label>

<input
type="text"
id="duration"
placeholder="7 Days">

</div>

<div class="input-box">

<label>Follow Up</label>

<input
type="date"
id="followup">

</div>

</div>

<div class="input-box">

<label>Doctor Notes</label>

<textarea
id="doctorNotes"
rows="4"></textarea>

</div>

<div class="button-group">

<button
type="submit"
class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Prescription

</button>
<button
type="button"
id="printPrescription"
class="save-btn">

<i class="fa-solid fa-print"></i>

Print

</button>

<button
type="reset"
class="reset-btn">

Reset

</button>

</div>

</form>

</div>

</div>

<script src="../js/doctor.js"></script>

</body>

</html>
