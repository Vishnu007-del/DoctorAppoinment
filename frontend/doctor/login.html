<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Doctor Login | MediCare</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="doctor-login-page">

    <!-- Left Side -->

    <div class="doctor-left">

        <div class="overlay"></div>

        <div class="left-content">

            <i class="fa-solid fa-user-doctor"></i>

            <h1>Doctor Portal</h1>

            <h2>MediCare Hospital</h2>

            <p>

                Access your appointments, patient records,
                prescriptions, reports and consultation
                dashboard securely.

            </p>

        </div>

    </div>

    <!-- Right Side -->

    <div class="doctor-right">

        <div class="doctor-card">

            <h2>Doctor Login</h2>

            <p>

                Welcome back! Sign in to continue.

            </p>

            <form action="dashboard.html">

                <div class="input-box">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="text"
                        placeholder="Doctor ID / Email"
                        required>

                </div>

                <div class="input-box password-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="doctorPassword"
                        placeholder="Password"
                        required>

                    <span id="toggleDoctorPassword">

                        <i class="fa-solid fa-eye"></i>

                    </span>

                </div>

                <div class="login-options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

                <button
                    type="submit"
                    class="doctor-login-btn">

                    Login

                </button>

            </form>

            <a
                href="../role-selection.html"
                class="back-home">

                ← Back to Role Selection

            </a>

        </div>

    </div>

</div>

<script src="../js/script.js"></script>

</body>

</html>
